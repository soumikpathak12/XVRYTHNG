name: xvrythng
description: "xTechs Renewables Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_secure_storage: ^10.0.0

  # HTTP & networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # State management
  provider: ^6.1.2

  # Routing
  go_router: ^14.8.1

  # Image/file picking (camera + gallery)
  image_picker: ^1.1.2
  file_picker: ^8.1.6

  # Location (for attendance check-in)
  geolocator: ^13.0.2

  # Charts
  fl_chart: ^0.70.2

  # Date/time utilities
  intl: ^0.20.2
  table_calendar: ^3.1.3

  # URL launcher
  url_launcher: ^6.3.1

  # Cached network images
  cached_network_image: ^3.4.1

  # Pull to refresh
  pull_to_refresh: ^2.0.0

  # Shimmer loading
  shimmer: ^3.0.0

  # Toast/snackbar
  fluttertoast: ^8.2.10

  # CSV export/import
  csv: ^6.0.0
  path_provider: ^2.1.4

  # Sharing
  share_plus: ^10.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.jpeg"
  adaptive_icon_background: "#1A7B7B"
  adaptive_icon_foreground: "assets/icon/app_icon.jpeg"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.jpeg
